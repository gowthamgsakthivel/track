<!DOCTYPE html>
<html>
<head>
  <title>Video Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <a id="playLink" href="#">Play Video</a>

    <div class="player-shell hidden" id="playerShell">
      <iframe
        id="player"
        title="YouTube video player"
        allow="autoplay; encrypted-media; picture-in-picture"
        allowfullscreen
      ></iframe>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
