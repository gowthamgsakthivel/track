<!DOCTYPE html>
<html>
<head>
  <title>Location Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <a id="playLink" href="#">
      Play YouTube Video
    </a>

    <div class="video-shell hidden" id="videoShell">
      <button id="shareLocationBtn" class="overlay-btn">📍 Share Location</button>
      <iframe
        id="player"
        title="YouTube video player"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen
      ></iframe>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
